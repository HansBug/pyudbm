name: Code Test

on:
  push:
  workflow_dispatch:

jobs:
  unittest:
    name: Code test
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'ubuntu-22.04-arm'  # native Linux arm64 runner for non-EOL CPython majors
          - 'windows-2022'
          - 'macos-14'          # public macOS arm64 runner
          - 'macos-15-intel'    # public macOS x86_64 runner
        python-version:
          - '3.7'
          - '3.8'
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        exclude:
          - os: ubuntu-22.04-arm  # new ARM runner images only guarantee non-EOL CPython majors
            python-version: '3.7'
          - os: ubuntu-22.04-arm  # new ARM runner images only guarantee non-EOL CPython majors
            python-version: '3.8'
          - os: ubuntu-22.04-arm  # Python 3.9 is EOL and not guaranteed on fresh ARM runner images
            python-version: '3.9'
          - os: macos-14  # arm64 runner image has no usable 3.7 installer via setup-python
            python-version: '3.7'
          - os: macos-14  # arm64 runner image has no usable 3.8 installer via setup-python
            python-version: '3.8'
          - os: macos-15-intel  # new Intel macOS runner images only guarantee non-EOL CPython majors
            python-version: '3.7'
          - os: macos-15-intel  # new Intel macOS runner images only guarantee non-EOL CPython majors
            python-version: '3.8'
          - os: macos-15-intel  # Python 3.9 is EOL and not guaranteed on fresh Intel macOS runner images
            python-version: '3.9'

    steps:
      - name: Get system version for Linux
        if: ${{ contains(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          echo "OS_NAME=Linux" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for Windows
        if: ${{ contains(matrix.os, 'windows') }}
        shell: bash
        run: |
          echo "OS_NAME=Windows" >> $GITHUB_ENV
          echo "IS_WIN=1" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for MacOS
        if: ${{ contains(matrix.os, 'macos') }}
        shell: bash
        run: |
          echo "OS_NAME=MacOS" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=1" >> $GITHUB_ENV
      - name: Set environment for Cpython
        if: ${{ !contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=" >> $GITHUB_ENV
      - name: Set environment for PyPy
        if: ${{ contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=1" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependencies on Linux
        if: ${{ env.OS_NAME == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make
          sudo apt-get install -y git ninja-build make gcc g++
      - name: Set up system dependencies on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          choco install tree cloc wget curl make
          choco install ninja make mingw
      - name: Kill Primitive CMake on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          ./macos_kill_cmake.sh
      - name: Set up system dependencies on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        run: |
          brew install tree cloc wget curl make
          brew install git ninja make gcc
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up pybind11
        shell: bash
        run: |
          pip install "pybind11[global]"
          pip install -U 'cmake<4'
      - name: Test the basic environment
        shell: bash
        run: |
          python -V
          cmake --version
          which gcc
          gcc --version
          which g++
          g++ --version
          ls -al
      - name: Build The Binaries
        shell: bash
        run: |
          CC=gcc CXX=g++ CTEST_CFG=Release make bin
          tree bin_install
      - name: Prepare Python Env
        shell: bash
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install -r requirements-build.txt
      - name: Test the Python environment
        shell: bash
        run: |
          python -V
          pip --version
          pip list
          cloc pyudbm
          cloc test
      - name: Build And Run Unittest
        env:
          CI: 'true'
          LINETRACE: 1
        shell: bash
        run: |
          make build
          tree pyudbm
          ls -al $(find pyudbm -type f)
          make clean_x
          make unittest
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  test_wheel_build:
    name: Try build
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    env:
      CIBW_CACHE_PATH: ./.cibw-cache
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'windows-2022'
          - 'macos-14'
          - 'macos-15-intel'  # x86_64 macOS wheel smoke builds
        python:
          - '3.8'
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        architecture:
          - x86_64
          - aarch64
          - arm64
          - AMD64
        exclude:
          - os: ubuntu-22.04
            architecture: AMD64
          - os: ubuntu-22.04
            architecture: arm64
          - os: windows-2022
            architecture: arm64
          - os: windows-2022
            architecture: x86_64
          - os: windows-2022
            architecture: aarch64
          - os: macos-14
            architecture: AMD64
          - os: macos-14
            architecture: x86_64
          - os: macos-14
            architecture: aarch64
          - os: macos-14
            python: '3.8'
            architecture: arm64
          - os: macos-15-intel
            architecture: AMD64
          - os: macos-15-intel
            architecture: arm64
          - os: macos-15-intel
            architecture: aarch64
          - os: macos-15-intel  # new Intel macOS runner images only guarantee non-EOL CPython majors
            python: '3.8'
          - os: macos-15-intel  # Python 3.9 is EOL and not guaranteed on fresh Intel macOS runner images
            python: '3.9'
            architecture: x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 20
          submodules: 'recursive'

      - name: Set up QEMU
        if: ${{ runner.os == 'Linux' }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Check the Arch on macOS
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          uname -m
          [ "$(uname -m)" = "${{ matrix.architecture }}" ] || { echo "The architecture is not ${{ matrix.architecture }}."; exit 1; }
      - name: Set up python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Prime cibuildwheel cache
        if: ${{ runner.os == 'Windows' || runner.os == 'macOS' }}
        shell: bash
        run: |
          case "${{ matrix.python }}" in
            3.7) VIRTUALENV_VERSION=20.21.1 ;;
            *) VIRTUALENV_VERSION=20.30.0 ;;
          esac
          mkdir -p "$CIBW_CACHE_PATH"
          TARGET="$CIBW_CACHE_PATH/virtualenv-${VIRTUALENV_VERSION}.pyz"
          URL="https://raw.githubusercontent.com/pypa/get-virtualenv/${VIRTUALENV_VERSION}/public/virtualenv.pyz"
          if [ ! -f "$TARGET" ]; then
            curl -fL --retry 8 --retry-all-errors --retry-delay 5 -o "$TARGET" "$URL"
          fi
          ls -al "$CIBW_CACHE_PATH"
      - name: Build wheels
        env:
          CIBW_SKIP: "pp* cp31?t-*"
          CIBW_ARCHS: ${{ matrix.architecture }}
          CIBW_PROJECT_REQUIRES_PYTHON: ~=${{ matrix.python }}.0
        shell: bash
        run: |
          pip install cibuildwheel
          python -m cibuildwheel --output-dir wheelhouse
      - name: Show the buildings
        shell: bash
        run: |
          ls -al ./wheelhouse
          mv wheelhouse dist
      - name: Upload packed files to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ runner.os }}-cp${{ matrix.python }}-${{ matrix.architecture }}
          path: ./dist/*
#      - name: Upload packed files to artifacts
#        uses: actions/upload-artifact@v4
#        with:
#          name: build-artifacts-all
#          path: ./dist/*

  # the publishing can only be processed on linux system
  fake_publish:
    name: Fake Publish
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    needs:
      - test_wheel_build
    strategy:
      fail-fast: false
      matrix:
        python:
          - '3.8'

    steps:
      - name: Download packed files to artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-artifacts-*
          path: ./dist
          merge-multiple: true
      - name: Show the buildings
        shell: bash
        run: |
          ls -al ./dist
