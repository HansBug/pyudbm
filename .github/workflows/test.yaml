name: Code Test

on:
  push:
  workflow_dispatch:

jobs:
  unittest:
    name: Code test
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'windows-2022'
          - 'macos-14'
        python-version:
          - '3.7'
          - '3.8'
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        exclude:
          # The public macOS arm64 runner does not have usable setup-python installers for these EOL versions.
          - os: 'macos-14'
            python-version: '3.7'

    steps:
      - name: Get system version for Linux
        if: ${{ contains(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          echo "OS_NAME=Linux" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for Windows
        if: ${{ contains(matrix.os, 'windows') }}
        shell: bash
        run: |
          echo "OS_NAME=Windows" >> $GITHUB_ENV
          echo "IS_WIN=1" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for MacOS
        if: ${{ contains(matrix.os, 'macos') }}
        shell: bash
        run: |
          echo "OS_NAME=MacOS" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=1" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependencies on Linux
        if: ${{ env.OS_NAME == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make
          sudo apt-get install -y git ninja-build gcc g++
      - name: Set up system dependencies on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          choco install tree cloc wget curl make
          choco install ninja make mingw
      - name: Kill Primitive CMake on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          ./macos_kill_cmake.sh
      - name: Set up system dependencies on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          brew install tree cloc wget curl make
          brew install git ninja make gcc
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up build tools
        shell: bash
        run: |
          python -m pip install setuptools wheel
          python -m pip install "pybind11[global]"
          python -m pip install -U 'cmake<4'
      - name: Build native dependencies
        shell: bash
        run: |
          CC=gcc CXX=g++ CTEST_CFG=Release make bin
      - name: Prepare Python env
        shell: bash
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install -r requirements-build.txt
      - name: Build and run unittest
        env:
          CI: 'true'
          LINETRACE: 1
        shell: bash
        run: |
          make build
          make clean_x
          make unittest

  test_wheel_build:
    name: Try Build
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    env:
      CIBW_CACHE_PATH: ./.cibw-cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'ubuntu-22.04'
            python: '3.7'
            architecture: 'x86_64'
          - os: 'ubuntu-22.04'
            python: '3.8'
            architecture: 'x86_64'
          - os: 'ubuntu-22.04'
            python: '3.11'
            architecture: 'x86_64'
          - os: 'ubuntu-22.04'
            python: '3.14'
            architecture: 'x86_64'
          - os: 'windows-2022'
            python: '3.7'
            architecture: 'AMD64'
          - os: 'windows-2022'
            python: '3.8'
            architecture: 'AMD64'
          - os: 'windows-2022'
            python: '3.11'
            architecture: 'AMD64'
          - os: 'windows-2022'
            python: '3.14'
            architecture: 'AMD64'
          # Keep quick build smoke on the public macOS arm64 runner; Intel/macOS breadth lives in Release Test.
          - os: 'macos-14'
            python: '3.8'
            architecture: 'arm64'
          - os: 'macos-14'
            python: '3.9'
            architecture: 'arm64'
          - os: 'macos-14'
            python: '3.11'
            architecture: 'arm64'
          - os: 'macos-14'
            python: '3.14'
            architecture: 'arm64'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up QEMU
        if: ${{ runner.os == 'Linux' }}
        uses: docker/setup-qemu-action@v3
      - name: Set up python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Verify macOS arch
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          [ "$(uname -m)" = "${{ matrix.architecture }}" ]
      - name: Prime cibuildwheel cache
        if: ${{ runner.os == 'Windows' || runner.os == 'macOS' }}
        shell: bash
        run: |
          case "${{ matrix.python }}" in
            3.7) VIRTUALENV_VERSION=20.21.1 ;;
            *) VIRTUALENV_VERSION=20.30.0 ;;
          esac
          mkdir -p "$CIBW_CACHE_PATH"
          TARGET="$CIBW_CACHE_PATH/virtualenv-${VIRTUALENV_VERSION}.pyz"
          URL="https://raw.githubusercontent.com/pypa/get-virtualenv/${VIRTUALENV_VERSION}/public/virtualenv.pyz"
          if [ ! -f "$TARGET" ]; then
            curl -fL --retry 8 --retry-all-errors --retry-delay 5 -o "$TARGET" "$URL"
          fi
          ls -al "$CIBW_CACHE_PATH"
      - name: Build wheels
        env:
          CIBW_SKIP: "pp* cp31?t-*"
          CIBW_ARCHS: ${{ matrix.architecture }}
          CIBW_PROJECT_REQUIRES_PYTHON: ~=${{ matrix.python }}.0
        shell: bash
        run: |
          python -m pip install -U pip
          pip install cibuildwheel
          python -m cibuildwheel --output-dir wheelhouse
      - name: Show the buildings
        shell: bash
        run: |
          ls -al ./wheelhouse
          mv wheelhouse dist
      - name: Upload packed files to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ runner.os }}-cp${{ matrix.python }}-${{ matrix.architecture }}
          path: ./dist/*
