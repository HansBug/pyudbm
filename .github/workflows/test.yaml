name: Code Test

on:
  push:
  workflow_dispatch:

jobs:
  unittest:
    name: Code test
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'windows-2022'
          # Keep Code Test on the public macOS arm64 runner; Intel/macOS breadth lives in Release Test.
          - 'macos-14'
        python-version:
          - '3.7'
          - '3.8'
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        exclude:
          # The public macOS arm64 runner does not have usable setup-python installers for these EOL versions.
          - os: 'macos-14'
            python-version: '3.7'
          - os: 'macos-14'
            python-version: '3.8'

    steps:
      - name: Get system version for Linux
        if: ${{ contains(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          echo "OS_NAME=Linux" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for Windows
        if: ${{ contains(matrix.os, 'windows') }}
        shell: bash
        run: |
          echo "OS_NAME=Windows" >> $GITHUB_ENV
          echo "IS_WIN=1" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for MacOS
        if: ${{ contains(matrix.os, 'macos') }}
        shell: bash
        run: |
          echo "OS_NAME=MacOS" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=1" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependencies on Linux
        if: ${{ env.OS_NAME == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make
          sudo apt-get install -y git ninja-build gcc g++
      - name: Set up system dependencies on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          choco install tree cloc wget curl make
          choco install ninja make mingw
      - name: Kill Primitive CMake on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          ./macos_kill_cmake.sh
      - name: Set up system dependencies on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          brew install tree cloc wget curl make
          brew install git ninja make gcc
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up pybind11
        shell: bash
        run: |
          pip install "pybind11[global]"
          pip install -U 'cmake<4'
      - name: Build native dependencies
        shell: bash
        run: |
          CC=gcc CXX=g++ CTEST_CFG=Release make bin
      - name: Prepare Python env
        shell: bash
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install -r requirements-build.txt
      - name: Build and run unittest
        env:
          CI: 'true'
          LINETRACE: 1
        shell: bash
        run: |
          make build
          make clean_x
          make unittest

  test_wheel_build:
    name: Build smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'ubuntu-22.04'
            python: '3.8'
            architecture: 'x86_64'
          - os: 'ubuntu-22.04'
            python: '3.11'
            architecture: 'x86_64'
          - os: 'ubuntu-22.04'
            python: '3.14'
            architecture: 'x86_64'
          - os: 'windows-2022'
            python: '3.8'
            architecture: 'AMD64'
          - os: 'windows-2022'
            python: '3.11'
            architecture: 'AMD64'
          - os: 'windows-2022'
            python: '3.14'
            architecture: 'AMD64'
          # Keep quick build smoke on the public macOS arm64 runner; Intel/macOS breadth lives in Release Test.
          - os: 'macos-14'
            python: '3.10'
            architecture: 'arm64'
          - os: 'macos-14'
            python: '3.12'
            architecture: 'arm64'
          - os: 'macos-14'
            python: '3.14'
            architecture: 'arm64'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Verify macOS arch
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          [ "$(uname -m)" = "${{ matrix.architecture }}" ]
      - name: Prepare build frontend
        shell: bash
        run: |
          python -m pip install -U pip
          pip install setuptools wheel build "cmake<4" "pybind11[global]"
      - name: Kill Primitive CMake on MacOS
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          ./macos_kill_cmake.sh
      - name: Build native dependencies on Linux
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          cmake -S UUtils -B UUtils_build -DCMAKE_BUILD_TYPE=Release
          cmake --build UUtils_build --config Release --parallel 2
          cmake --install UUtils_build --prefix bin_install --config Release
          cmake -S UDBM -B UDBM_build -DCMAKE_BUILD_TYPE=Release -DUUtils_DIR="$PWD/bin_install/lib/cmake/UUtils"
          cmake --build UDBM_build --config Release --parallel 2
          cmake --install UDBM_build --prefix bin_install --config Release
      - name: Build native dependencies on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: |
          UUTILS_DIR_WIN=$(cygpath -w "$PWD/bin_install/lib/cmake/UUtils")
          cmake -S UUtils -B UUtils_build -DCMAKE_BUILD_TYPE=Release
          cmake --build UUtils_build --config Release --parallel 2
          cmake --install UUtils_build --prefix bin_install --config Release
          cmake -S UDBM -B UDBM_build -DCMAKE_BUILD_TYPE=Release -DUUtils_DIR="$UUTILS_DIR_WIN"
          cmake --build UDBM_build --config Release --parallel 2
          cmake --install UDBM_build --prefix bin_install --config Release
      - name: Build native dependencies on MacOS
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          cmake -S UUtils -B UUtils_build \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.architecture }}" \
            -DCMAKE_SYSTEM_PROCESSOR="${{ matrix.architecture }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TRY_COMPILE_OSX_ARCHITECTURES="${{ matrix.architecture }}"
          cmake --build UUtils_build --config Release --parallel 2
          cmake --install UUtils_build --prefix bin_install --config Release
          cmake -S UDBM -B UDBM_build \
            -DUUtils_DIR="$PWD/bin_install/lib/cmake/UUtils" \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.architecture }}" \
            -DCMAKE_SYSTEM_PROCESSOR="${{ matrix.architecture }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TRY_COMPILE_OSX_ARCHITECTURES="${{ matrix.architecture }}"
          cmake --build UDBM_build --config Release --parallel 2
          cmake --install UDBM_build --prefix bin_install --config Release
      - name: Smoke build wheel
        shell: bash
        run: |
          python -m build --wheel --no-isolation --outdir dist
          ls -al dist
